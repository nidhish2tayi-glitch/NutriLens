services:
  - type: web
    name: nutrilens-ai
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.6
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: DATABASE_PATH
        value: ../database/nutrilens.db
      - key: UPLOAD_DIR
        value: ../uploads
      - key: MAX_UPLOAD_MB
        value: "10"
      - key: CORS_ORIGINS
        value: "*"
